name: Reporte de Ventas Semanal

# DISPARADORES:
#   1. repository_dispatch -> cron-job.org, VIERNES 7:30 AR (30 min despues del diario).
#   2. workflow_dispatch   -> boton manual.
# Sin 'schedule': un solo disparador automatico. Este mail va a los SOCIOS, asi que
# un duplicado seria feo. Igual queda el candado de data/semanal.json por si
# cron-job.org reintenta el POST.
on:
  repository_dispatch:
    types: [reporte-semanal]
  workflow_dispatch:
    inputs:
      hasta:
        description: "Jueves de cierre (YYYY-MM-DD). Vacio = la ultima semana cerrada."
        required: false
      forzar:
        description: "Reenviar aunque la semana ya se haya mandado (true/false)"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: reportes-luccianos
  cancel-in-progress: false

jobs:
  enviar-semanal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install openpyxl matplotlib

      # NO baja nada de TouchBistro: la semana sale del historial y el acumulado
      # del mes sale de data/acumulado.json, los dos ya commiteados por el diario.
      # Si el diario del jueves no corrio, este paso corta en rojo y no manda nada.
      - name: Generar reporte semanal
        id: gen
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.hasta }}" ]; then ARGS="$ARGS --hasta ${{ github.event.inputs.hasta }}"; fi
          if [ "${{ github.event.inputs.forzar }}" = "true" ]; then ARGS="$ARGS --forzar"; fi
          python report_semanal.py $ARGS

      - name: Enviar mail a los socios
        if: steps.gen.outputs.send == 'true'
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          MAIL_TO_SOCIOS: ${{ secrets.MAIL_TO_SOCIOS }}
        run: |
          python send_mail.py "${{ steps.gen.outputs.subject }}" preview_semanal.html \
            --to-env MAIL_TO_SOCIOS \
            logo=Logo.png \
            comparativo=charts/sem_comparativo.png \
            progreso=charts/sem_progreso.png \
            dias=charts/sem_dias.png

      # Solo si se mando: el candado (data/semanal.json) tiene que quedar guardado
      # si y solo si el mail salio.
      - name: Commitear resultados
        if: steps.gen.outputs.send == 'true'
        run: |
          git config user.name "luccianos-bot"
          git config user.email "bot@luccianos.local"
          git add data/semanal.json charts/sem_*.png Acumulado_semanal_ant.xlsx Acumulado_mensual_ant.xlsx
          if git diff --cached --quiet; then
            echo "Sin cambios para commitear."
          else
            git commit -m "Reporte semanal ${{ steps.gen.outputs.week }} [skip ci]"
            git pull --rebase --autostash
            git push
          fi
