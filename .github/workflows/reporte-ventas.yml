name: Reporte de Ventas Diario

# Ahora corre por HORARIO (cron), no por push. Todo en un solo job:
# bajar el mail de TouchBistro -> armar el 2025 -> tu report.py -> mandar mail.
on:
  schedule:
    # OJO: el cron esta en UTC. TouchBistro manda el reporte ~2hs despues del
    # cierre del dia de servicio (horario US Eastern). Programa esto un rato
    # DESPUES de que llega el mail. Default: 11:00 UTC (~7am ET en verano).
    # Ajustalo una vez que veas a que hora te llega el mail automatico.
    - cron: "0 11 * * *"
  workflow_dispatch: {}   # boton para correrlo a mano y probar

permissions:
  contents: write

concurrency:
  group: reporte-ventas
  cancel-in-progress: false

jobs:
  enviar-reporte:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install openpyxl matplotlib

      - name: Bajar reporte de TouchBistro (mail -> Ventas_ayer.xlsx)
        env:
          IMAP_USER: ${{ secrets.IMAP_USER }}
          IMAP_APP_PASS: ${{ secrets.IMAP_APP_PASS }}
        run: python fetch_touchbistro.py

      - name: Armar Acumulado 2025 desde el master
        run: python generar_acum2025.py

      - name: Generar reporte (y actualizar acumulado)
        id: gen
        run: python report.py

      - name: Enviar mail
        if: steps.gen.outputs.send == 'true'
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python send_mail.py "${{ steps.gen.outputs.subject }}" preview.html

      - name: Commitear resultados
        if: steps.gen.outputs.send == 'true'
        run: |
          git config user.name "luccianos-bot"
          git config user.email "bot@luccianos.local"
          git add data/acumulado.json charts/ Ventas_ayer.xlsx Acumulado_interanual.xlsx
          if git diff --cached --quiet; then
            echo "Sin cambios para commitear."
          else
            git commit -m "Reporte del ${{ steps.gen.outputs.date }} [skip ci]"
            git push
          fi
