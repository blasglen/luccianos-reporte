name: Reporte de Ventas Diario

# DISPARADORES:
#   1. repository_dispatch -> lo dispara cron-job.org por API, todos los dias 7:00 AR.
#   2. workflow_dispatch   -> boton manual para probar.
# NO hay 'schedule' a proposito: un solo disparador automatico = imposible que se
# mande dos veces. Si cron-job.org se cae, no llega el reporte y se corre a mano.
on:
  repository_dispatch:
    types: [reporte-diario]
  workflow_dispatch: {}

permissions:
  contents: write

# Los tres reportes comparten grupo: si dos se disparan cerca (ej. un dia 1ro que
# cae viernes), se serializan y no chocan los git push.
concurrency:
  group: reportes-luccianos
  cancel-in-progress: false

jobs:
  enviar-reporte:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install openpyxl matplotlib

      - name: Bajar reporte de TouchBistro (mail -> Ventas_ayer.xlsx)
        env:
          IMAP_USER: ${{ secrets.IMAP_USER }}
          IMAP_APP_PASS: ${{ secrets.IMAP_APP_PASS }}
        run: python fetch_touchbistro.py

      # Registra el dia en data/historico_<anio>.json. Va ANTES de report.py a
      # proposito: es idempotente (la fecha es la clave) y asi el dia queda
      # guardado aunque report.py despues decida no enviar por fecha repetida.
      - name: Registrar dia en el historial
        run: python historico.py

      - name: Armar Acumulado 2025 desde el master
        run: python generar_acum2025.py

      - name: Generar reporte (y actualizar acumulado)
        id: gen
        run: python report.py

      - name: Enviar mail
        if: steps.gen.outputs.send == 'true'
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python send_mail.py "${{ steps.gen.outputs.subject }}" preview.html

      # Corre SIEMPRE: el historial se escribe aunque no se mande el mail y no lo
      # quiero perder. Si no hubo cambios, git lo detecta y no commitea nada.
      - name: Commitear resultados
        if: always()
        run: |
          git config user.name "luccianos-bot"
          git config user.email "bot@luccianos.local"
          git add data/acumulado.json data/historico_*.json charts/ Ventas_ayer.xlsx Acumulado_interanual.xlsx
          if git diff --cached --quiet; then
            echo "Sin cambios para commitear."
          else
            git commit -m "Datos del dia ${{ steps.gen.outputs.date }} [skip ci]"
            git pull --rebase --autostash
            git push
          fi
