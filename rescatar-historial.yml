name: Rescatar historial (one-shot)

# SOLO manual. No tiene disparador automatico y no lo va a tener nunca:
# es un script de una sola vez para sembrar el historial con los mails viejos
# de TouchBistro que sigan en la casilla.
#
# Uso: Actions -> Rescatar historial -> Run workflow -> poner las fechas.
# Recomendado: correrlo primero con dry_run = true para ver que encuentra.
on:
  workflow_dispatch:
    inputs:
      desde:
        description: "Rescatar desde (YYYY-MM-DD)"
        required: true
        default: "2026-07-01"
      hasta:
        description: "Rescatar hasta (YYYY-MM-DD). Vacio = hoy."
        required: false
      dry_run:
        description: "Solo mostrar que encontraria, sin escribir (true/false)"
        required: false
        default: "true"
      pisar:
        description: "Sobrescribir dias que ya esten en el historial (true/false)"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: reportes-luccianos
  cancel-in-progress: false

jobs:
  rescatar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install openpyxl matplotlib

      - name: Rescatar del IMAP
        env:
          IMAP_USER: ${{ secrets.IMAP_USER }}
          IMAP_APP_PASS: ${{ secrets.IMAP_APP_PASS }}
        run: |
          ARGS="--desde ${{ github.event.inputs.desde }}"
          if [ -n "${{ github.event.inputs.hasta }}" ]; then ARGS="$ARGS --hasta ${{ github.event.inputs.hasta }}"; fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          if [ "${{ github.event.inputs.pisar }}" = "true" ]; then ARGS="$ARGS --pisar"; fi
          python fetch_historico.py $ARGS

      - name: Commitear historial
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "luccianos-bot"
          git config user.email "bot@luccianos.local"
          git add data/historico_*.json
          if git diff --cached --quiet; then
            echo "Sin cambios para commitear."
          else
            git commit -m "Rescate de historial ${{ github.event.inputs.desde }} [skip ci]"
            git pull --rebase --autostash
            git push
          fi
